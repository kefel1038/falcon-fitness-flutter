# Codemagic Flutter CI/CD configuration

workflows:
  flutter-build:
    name: Flutter Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Analyze code
        script: flutter analyze
      - name: Run tests
        script: flutter test
      - name: Build Android APK
        script: flutter build apk --release
        ignore_failure: true
      - name: Build iOS
        script: flutter build ios --release --no-codesign
        ignore_failure: true
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/ios/iphoneos/*.app
    publishing:
      email:
        recipients:
          - kefel1038@gmail.com
